<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WOLFFY | Move Along</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        spBg: '#0a0505',
                        spPanel: '#140a0a',
                        spHover: '#281414',
                        spGreen: '#1DB954',
                        spText: '#FFFFFF',
                        spSubtext: '#b3b3b3',
                        rockOrange: '#FF4500',
                        rockRed: '#DC143C'
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>

    <style>
        /* WOLFFY AESTHETIC - ROCK THEME */
        body { 
            background-color: #0a0505; 
            color: #FFFFFF; 
            overflow-x: hidden; 
            font-family: 'Inter', sans-serif;
            background-image: radial-gradient(circle at 15% 50%, rgba(255, 69, 0, 0.1), transparent 50%),
                              radial-gradient(circle at 85% 30%, rgba(220, 20, 60, 0.15), transparent 50%),
                              linear-gradient(to bottom, #140a0a 0%, #0a0505 100%);
            background-attachment: fixed;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 69, 0, 0.5); }

        .glass-panel {
            background: rgba(20, 10, 10, 0.6);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
        }

        .lyric-word {
            position: relative; display: inline-block; cursor: pointer;
            color: #FFFFFF; font-weight: 800; transition: all 0.2s;
            border-bottom: 2px dashed #FF4500; padding-bottom: 2px;
        }
        .lyric-word:hover { color: #FF4500; text-shadow: 0 0 15px rgba(255, 69, 0, 0.6); }
        .lyric-word.active { background: #FF4500; color: #FFFFFF; border-bottom: none; padding: 2px 6px; border-radius: 4px; }

        .spotify-lyrics-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.02) 100%);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        .combat-btn { transition: all 0.2s; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); }
        .combat-btn:hover:not(:disabled) { background: rgba(255,255,255,0.15); border-color: rgba(255, 69, 0, 0.5); transform: scale(1.02); }
        .combat-btn.correct { background: #FF4500; color: #FFFFFF; font-weight: bold; border-color: #FF4500; box-shadow: 0 0 15px rgba(255, 69, 0, 0.4); }
        .combat-btn.wrong { background: #DC143C; color: #FFFFFF; border-color: #DC143C; opacity: 0.6; }

        .stt-box {
            background: rgba(255,255,255,0.05);
            border-left: 4px solid #FF4500;
            border-radius: 0 8px 8px 0;
        }

        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        .slide-up { animation: slideUp 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .damage-flash { animation: shake 0.3s; box-shadow: inset 0 0 60px rgba(220, 20, 60, 0.4) !important; }
        .xp-flash { box-shadow: inset 0 0 60px rgba(255, 69, 0, 0.4) !important; }

        .drawer { transition: transform 0.4s cubic-bezier(0.3, 0.7, 0.3, 1); }
        
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden selection:bg-rockOrange selection:text-white">

    <!-- TOP NAV -->
    <header class="fixed top-0 w-full z-40 glass-panel px-6 py-4 flex justify-between items-center border-b-0">
        <div class="flex items-center gap-3">
            <i class="fa-brands fa-spotify text-spGreen text-3xl drop-shadow-[0_0_10px_rgba(29,185,84,0.5)]"></i>
            <span class="font-bold text-xl tracking-tight">Wolffy <span class="text-xs bg-white text-black px-1 rounded ml-1 uppercase shadow-lg">B1</span></span>
        </div>
        
        <div class="flex items-center gap-6 text-sm font-medium">
            <div class="flex items-center gap-2" title="Energy (HP)">

                <span id="hp-text" class="text-white">100%</span>
            </div>
            <div class="flex items-center gap-2" title="Fans (XP)">
                <i class="fa-solid fa-fire text-rockOrange"></i>

                <i class="fa-solid fa-expand text-lg"></i>

    <!-- MAIN STAGE -->

    <!-- RIGHT DRAWER: WOLF INSIGHTS -->

            <button onclick="closeIntel()" class="text-spSubtext hover:text-white transition-colors"><i class="fa-solid fa-xmark text-xl"></i></button>
        </div>

    </div>

    <!-- LEFT DRAWER: PLAYLIST -->
    <div id="lesson-map" class="fixed left-0 top-16 bottom-[90px] w-[350px] glass-panel border-r-0 border-white/10 z-[5000] -translate-x-full drawer flex flex-col">
        <div class="p-6 pb-2">
            <h2 class="font-bold text-xl mb-1">Tracklist</h2>

        </div>
        <div class="px-6 py-4">
            <div class="w-full h-1 bg-spHover rounded-full overflow-hidden">

            </div>
        </div>
        <div id="map-nodes" class="flex-grow flex flex-col gap-1 overflow-y-auto px-4 pb-4"></div>
    </div>

    <!-- RIGHT DRAWER: TEACHER'S NOTES -->
    <div id="teacher-board" class="fixed right-0 top-0 h-full w-[450px] glass-panel border-l border-rockOrange/30 z-[6000] translate-x-full drawer flex flex-col">
        <div class="p-6 border-b border-white/10 flex justify-between items-center bg-black/20">
            <h2 class="font-bold text-lg text-rockOrange"><i class="fa-solid fa-chalkboard-user mr-2 drop-shadow-[0_0_8px_rgba(255,69,0,0.5)]"></i>Teacher's Board</h2>
            <div class="flex gap-4">

                <button onclick="toggleDrawer('teacher-board')" class="text-spSubtext hover:text-white"><i class="fa-solid fa-chevron-right text-xl"></i></button>

        </div>

    <!-- BOTTOM MUSIC PLAYER -->
    <footer class="fixed bottom-0 w-full z-50 glass-panel border-t-0 border-white/5 px-4 py-3 flex justify-between items-center h-[90px]">
        <div class="flex items-center gap-4 w-1/3">

            </div>
            <div class="hidden sm:block truncate">

                <p class="text-spSubtext text-xs truncate">The All-American Rejects • B1</p>
            </div>
            <button onclick="toggleDrawer('teacher-board')" class="ml-2 text-spSubtext hover:text-rockOrange transition-colors" title="Teacher Notes">

        <div class="flex flex-col items-center justify-center w-1/3 max-w-md">

            <div class="w-20 h-1 bg-spHover rounded-full hidden sm:block">
                <div class="h-full w-2/3 bg-spSubtext hover:bg-rockOrange rounded-full cursor-pointer transition-colors"></div>
            </div>
        </div>
    </footer>

        // 3. ENGINE LOGIC
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Error attempting to enable fullscreen: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) { document.exitFullscreen(); }
            }
        }

        function updateHUD() {
            document.getElementById('hp-text').innerText = state.hp + "%";
            document.getElementById('xp-text').innerText = state.xp;
            const total = lessonData.length - 1;
            const percentage = (state.current / total) * 100;
            document.getElementById('playlist-progress').style.width = `${percentage}%`;
            document.getElementById('player-progress').style.width = `${percentage}%`;
        }

        function takeDamage(amount) {
            state.hp = Math.max(0, state.hp - amount);
            updateHUD();
            document.body.classList.add('damage-flash');
            setTimeout(() => document.body.classList.remove('damage-flash'), 400);
            if (state.hp <= 0) { 
                alert("Game Over! Out of Energy."); 
                location.reload(); 
            }
        }

        function gainXP(amount) { state.xp += amount; updateHUD(); }

        function renderMap() {
            const container = document.getElementById('map-nodes');
            document.getElementById('map-subtitle').innerText = `${lessonData.length} Steps • Intermediate B1`;
            document.getElementById('total-step-display').innerText = lessonData.length;

            container.innerHTML = lessonData.map((step, i) => {
                let color = i === state.current ? 'text-rockOrange font-bold' : (i < state.current ? 'text-white' : 'text-spSubtext');
                return `
                <div class="flex items-center justify-between p-2 rounded cursor-pointer hover:bg-spHover group" onclick="jumpTo(${i})">
                    <div class="flex items-center gap-3">
                        <span class="text-xs font-mono w-4 text-right ${i === state.current ? 'text-rockOrange' : 'text-spSubtext'}">${i + 1}</span>
                        <span class="text-sm ${color}">${step.title}</span>
                    </div>
                    ${i === state.current ? '<i class="fa-solid fa-volume-high text-rockOrange text-xs"></i>' : '<i class="fa-solid fa-play text-white opacity-0 group-hover:opacity-100 text-xs"></i>'}
                </div>
            `}).join('');
        }

        function renderStep() {
            closeIntel();
            const stage = document.getElementById('mission-content');
            stage.innerHTML = lessonData[state.current].html;
            
            let displayNum = state.current + 1;
            document.getElementById('current-step-display').innerText = displayNum < 10 ? `0${displayNum}` : displayNum;
            document.getElementById('btn-prev').disabled = state.current === 0;
            document.getElementById('btn-next').disabled = state.current === lessonData.length - 1;
            
            if (lessonData[state.current].onLoad) lessonData[state.current].onLoad();
            renderMap();
            updateHUD();
        }

        function nextStep() { if (state.current < lessonData.length - 1) { state.current++; renderStep(); } }
        function prevStep() { if (state.current > 0) { state.current--; renderStep(); } }
        function jumpTo(idx) { state.current = idx; renderStep(); toggleDrawer('lesson-map'); }

        function toggleDrawer(id) {
            const drawers = ['lesson-map', 'intel-panel', 'teacher-board'];
            drawers.forEach(drawerId => {
                const drawer = document.getElementById(drawerId);
                if (!drawer) return;
                
                if (drawerId === id) {
                    if (drawer.classList.contains('translate-x-full') || drawer.classList.contains('-translate-x-full')) {
                        drawer.classList.remove('translate-x-full', '-translate-x-full');
                    } else {
                        if (id === 'lesson-map') drawer.classList.add('-translate-x-full');
                        else drawer.classList.add('translate-x-full');
                    }
                } else {
                    if (drawerId === 'lesson-map') drawer.classList.add('-translate-x-full');
                    else drawer.classList.add('translate-x-full');
                }
            });
        }

        function clearNotes() {
            document.getElementById('t-notes').value = '';
            document.getElementById('t-notes').focus();
        }

        // --- NEW: Vibe Choice Logic ---
        function selectVibe(num, choice) {
            const btnA = document.getElementById(`vibe-btn-${num}-a`);
            const btnB = document.getElementById(`vibe-btn-${num}-b`);
            const fbA = document.getElementById(`vibe-fb-${num}-a`);
            const fbB = document.getElementById(`vibe-fb-${num}-b`);

            // Reset states
            btnA.classList.remove('border-rockOrange', 'bg-rockOrange/10', 'text-rockOrange');
            btnB.classList.remove('border-rockOrange', 'bg-rockOrange/10', 'text-rockOrange');
            fbA.classList.add('hidden');
            fbB.classList.add('hidden');

            // Apply selected
            if (choice === 'a') {
                btnA.classList.add('border-rockOrange', 'bg-rockOrange/10', 'text-rockOrange');
                fbA.classList.remove('hidden');
                fbA.classList.add('slide-up');
            } else {
                btnB.classList.add('border-rockOrange', 'bg-rockOrange/10', 'text-rockOrange');
                fbB.classList.remove('hidden');
                fbB.classList.add('slide-up');
            }
        }

        function revealIntel(key, el = null) {
            const data = intelDB[key];
            if (!data) return;
            
            if (el) {
                document.querySelectorAll('.lyric-word').forEach(r => r.classList.remove('active'));
                el.classList.add('active');
            }
            
            document.getElementById('intel-content').innerHTML = `
                <div class="flex flex-col items-center text-center mb-10 fade-in">
                    <span class="text-7xl mb-6 drop-shadow-lg">${data.emoji}</span>
                    <h2 class="font-black text-4xl text-white mb-4 drop-shadow-md">${data.title}</h2>
                    <span class="glass-panel text-white border border-white/20 px-4 py-1.5 rounded-md text-xs font-bold uppercase tracking-widest shadow-sm">${data.type}</span>
                </div>
                <div class="mb-6 slide-up">
                    <p class="text-spSubtext text-xs uppercase font-bold tracking-widest mb-2 drop-shadow-sm">Meaning</p>
                    <p class="text-white text-xl font-medium leading-relaxed">${data.meaning}</p>
                </div>
                <div class="glass-panel p-6 rounded-2xl slide-up border border-white/5" style="animation-delay: 0.1s">
                    <p class="text-rockOrange text-xs uppercase font-bold tracking-widest mb-3 drop-shadow-sm">Example</p>
                    <p class="text-white text-lg italic font-medium">"${data.example}"</p>
                </div>
                ${data.followUp ? `
                <div class="stt-box p-5 mt-6 glass-panel rounded-xl shadow-lg slide-up border-l-rockOrange" style="animation-delay: 0.2s">
                    <span class="text-xs text-rockOrange uppercase font-bold tracking-widest mb-2 block">Your Turn:</span>
                    <p class="text-white text-base font-medium italic">"${data.followUp}"</p>
                </div>
                ` : ''}
            `;
            document.getElementById('intel-panel').classList.remove('translate-x-full');
        }
        
        function closeIntel() { 
            document.getElementById('intel-panel').classList.add('translate-x-full'); 
            document.querySelectorAll('.lyric-word').forEach(r => r.classList.remove('active'));
        }

        function checkCombat(btn, isCorrect, num) {
            const btns = btn.parentElement.querySelectorAll('.combat-btn');
            btns.forEach(b => { b.disabled = true; if(b !== btn) b.style.opacity = '0.3'; });
            
            if (isCorrect) {
                btn.classList.add('correct');
                gainXP(20);
                document.getElementById(`drill-${num}`).classList.add('xp-flash');
                setTimeout(() => document.getElementById(`drill-${num}`).classList.remove('xp-flash'), 500);
                document.getElementById(`fb-${num}`).classList.remove('hidden');
            } else {
                btn.classList.add('wrong');
                takeDamage(15);
                setTimeout(() => {
                    btns.forEach(b => { if(!b.classList.contains('wrong')){ b.disabled = false; b.style.opacity = '1'; } });
                }, 600);
            }
        }

        window.onload = renderStep;
    </script>
